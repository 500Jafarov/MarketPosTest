<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0b0e;
  --bg2: #111318;
  --bg3: #181c24;
  --bg4: #1e2330;
  --border: #252d3d;
  --border2: #2e3850;
  --accent: #e8a020;
  --accent2: #f0b840;
  --accent-dim: rgba(232,160,32,0.12);
  --accent-glow: rgba(232,160,32,0.25);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --purple: #a855f7;
  --text: #e8eaf0;
  --text2: #9ba3b8;
  --text3: #5a6480;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Syne', sans-serif;
  --body: 'Inter', sans-serif;
  --radius: 8px;
  --radius2: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Typography */
h1,h2,h3,h4 { font-family: var(--sans); font-weight: 700; }

/* Layout */
.app-shell { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 13px;
  color: #000;
  flex-shrink: 0;
}
.logo-text { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
.nav-section-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 12px 18px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 0;
  color: var(--text2);
  font-size: 13.5px;
  font-weight: 500;
  position: relative;
  border-left: 2px solid transparent;
  user-select: none;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-left-color: var(--accent);
}
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-family: var(--mono);
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
}

.sidebar-user {
  border-top: 1px solid var(--border);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 600; color: var(--text); }
.user-role { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.logout-btn {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  transition: color 0.15s;
}
.logout-btn:hover { color: var(--red); }

/* Main content */
.main-content {
  flex: 1;
  margin-left: 220px;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}
.page-header {
  padding: 24px 28px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.page-title { font-size: 22px; font-weight: 800; color: var(--text); }
.page-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.page-body { padding: 20px 28px 32px; flex: 1; }

/* Cards */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 18px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--text); font-family: var(--sans); }

/* Stat Cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0.6;
}
.stat-card.green::before { background: var(--green); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.purple::before { background: var(--purple); }
.stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
.stat-value { font-size: 26px; font-weight: 800; font-family: var(--sans); color: var(--text); margin: 6px 0 2px; line-height: 1; }
.stat-change { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.stat-icon { position: absolute; top: 14px; right: 16px; font-size: 28px; opacity: 0.1; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  padding: 10px 14px;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  font-weight: 500;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: var(--bg3); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 11px 14px; color: var(--text); vertical-align: middle; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: var(--body);
  white-space: nowrap;
  touch-action: manipulation;
  text-decoration: none;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover:not(:disabled) { background: var(--bg4); border-color: var(--text3); }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
.btn-danger:hover:not(:disabled) { background: var(--red); color: #fff; }
.btn-success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
.btn-success:hover:not(:disabled) { background: var(--green); color: #000; }
.btn-ghost { background: none; color: var(--text2); padding: 6px 10px; }
.btn-ghost:hover { color: var(--text); background: var(--bg3); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-lg { padding: 11px 22px; font-size: 14px; }
.btn-icon { width: 34px; height: 34px; padding: 0; justify-content: center; }

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em; }
.form-control {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 9px 12px;
  color: var(--text);
  font-size: 13.5px;
  font-family: var(--body);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.form-control::placeholder { color: var(--text3); }
select.form-control option { background: var(--bg3); }
textarea.form-control { resize: vertical; min-height: 80px; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.form-error { font-size: 11px; color: var(--red); margin-top: 4px; font-family: var(--mono); }

/* Badges */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  white-space: nowrap;
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-yellow { background: var(--accent-dim); color: var(--accent); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.badge-gray { background: var(--bg4); color: var(--text3); }

/* Search bar */
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 7px 12px;
  min-width: 220px;
}
.search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 13.5px; flex: 1; font-family: var(--body); }
.search-bar input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: 14px; flex-shrink: 0; }

/* Modals */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.2s;
  box-shadow: var(--shadow);
}
.modal-lg { max-width: 780px; }
.modal-xl { max-width: 1000px; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg2); z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 800; font-family: var(--sans); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
  background: var(--bg2);
  position: sticky; bottom: 0;
}

/* Toast notifications */
.toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow);
  pointer-events: all;
  animation: toastIn 0.2s;
  min-width: 260px;
  max-width: 360px;
}
@keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--blue); }
.toast.warning { border-left: 3px solid var(--accent); }

/* POS Layout */
.pos-layout { display: flex; gap: 16px; height: calc(100vh - 140px); min-height: 600px; }
.pos-products { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
.pos-cart { width: 380px; min-width: 340px; display: flex; flex-direction: column; gap: 0; }
.pos-products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  overflow-y: auto;
  flex: 1;
  padding: 2px;
  align-content: start;
}
.product-card-pos {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  user-select: none;
}
.product-card-pos:hover { border-color: var(--accent); background: var(--bg3); transform: translateY(-1px); }
.product-card-pos.out-of-stock { opacity: 0.45; cursor: not-allowed; }
.product-card-pos:hover.out-of-stock { transform: none; border-color: var(--border); }
.pos-product-img {
  width: 100%; aspect-ratio: 1;
  background: var(--bg3);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  overflow: hidden;
  object-fit: cover;
}
.pos-product-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.pos-product-name { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
.pos-product-price { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
.pos-product-stock { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* Cart */
.cart-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.cart-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.cart-title { font-size: 14px; font-weight: 700; font-family: var(--sans); }
.cart-type-toggle { display: flex; gap: 4px; }
.type-btn {
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text3);
  transition: all 0.15s;
}
.type-btn.active.retail { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.type-btn.active.wholesale { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.cart-items { flex: 1; overflow-y: auto; padding: 8px; }
.cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px; color: var(--text3); gap: 8px; font-size: 13px; }
.cart-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  background: var(--bg3);
}
.cart-item-name { font-size: 12.5px; font-weight: 600; flex: 1; min-width: 0; }
.cart-item-name small { display: block; color: var(--text3); font-size: 11px; font-family: var(--mono); margin-top: 1px; }
.qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.qty-btn {
  width: 24px; height: 24px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text);
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
  flex-shrink: 0;
}
.qty-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
.qty-val { font-family: var(--mono); font-size: 13px; font-weight: 600; width: 28px; text-align: center; }
.qty-val-input { font-family: var(--mono); font-size: 13px; font-weight: 600; width: 40px; text-align: center; border: 1px solid var(--border2); border-radius: 4px; background: var(--bg); color: var(--text); padding: 2px 4px; }
.qty-val-input:focus { outline: none; border-color: var(--accent); }
.cart-item-total { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); text-align: right; min-width: 64px; flex-shrink: 0; }
.cash-change-panel { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
.cash-change-result { display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.price-edit-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 11px; padding: 1px 3px;
  border-radius: 4px; transition: all 0.15s; line-height: 1;
  display: inline-flex; align-items: center;
}
.price-edit-btn:hover { color: var(--accent); background: var(--accent-dim); }
.price-edit-wrap {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.price-edit-input {
  width: 72px; background: var(--bg4); border: 1.5px solid var(--accent);
  border-radius: 6px; color: var(--accent); font-family: var(--mono);
  font-size: 13px; font-weight: 700; padding: 3px 6px;
  outline: none; text-align: right;
}
.price-edit-input:focus { box-shadow: 0 0 0 2px var(--accent-dim); }
.price-manual-badge {
  font-size: 9px; font-family: var(--mono); font-weight: 700;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(232,160,32,0.3); border-radius: 4px;
  padding: 1px 4px; margin-left: 3px; white-space: nowrap;
}
.price-original {
  font-size: 10px; color: var(--text3); font-family: var(--mono);
  text-decoration: line-through; margin-left: 2px;
}
.remove-btn { color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px; flex-shrink: 0; transition: color 0.1s; background: none; border: none; }
.remove-btn:hover { color: var(--red); }

.cart-footer { border-top: 1px solid var(--border); padding: 12px 14px; flex-shrink: 0; }
.cart-summary { margin-bottom: 10px; }
.cart-summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.cart-total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 800; color: var(--text); font-family: var(--sans); padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px; }
.cart-total-row span:last-child { color: var(--accent); }

/* Sidebar footer */
.sidebar-footer {
  text-align: center;
  padding: 10px 14px 14px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.02em;
  border-top: 1px solid var(--border);
}
.sidebar-footer strong { color: var(--text2); font-weight: 600; }

/* Login page */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.login-bg {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(232,160,32,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.05) 0%, transparent 60%);
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 380px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}
.login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.login-logo-mark {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 600; font-size: 16px; color: #000;
}
.login-logo-text { font-family: var(--sans); font-size: 20px; font-weight: 800; }
.login-logo-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.login-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.login-subtitle { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
.demo-accounts {
  margin-top: 18px;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
}
.demo-accounts strong { color: var(--text2); display: block; margin-bottom: 4px; }

/* Product image placeholder */
.product-img-placeholder {
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg3);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: var(--text3);
  border: 2px dashed var(--border2);
  cursor: pointer;
  transition: all 0.15s;
}
.product-img-placeholder:hover { border-color: var(--accent); }

/* Alert */
.alert {
  padding: 11px 14px;
  border-radius: var(--radius);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  margin-bottom: 14px;
}
.alert-warning { background: var(--accent-dim); border: 1px solid rgba(232,160,32,0.25); color: var(--accent2); }
.alert-error { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25); color: var(--red); }
.alert-success { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.25); color: var(--green); }
.alert-info { background: var(--blue-dim); border: 1px solid rgba(59,130,246,0.25); color: var(--blue); }

/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Receipt styles */
.receipt-preview {
  background: #fff;
  color: #111;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 20px 16px;
  max-width: 384px;  /* 80mm @ 96dpi */
  width: 100%;
  margin: 0 auto;
  line-height: 1.6;
}
.receipt-header { text-align: center; margin-bottom: 12px; }
.receipt-store-name { font-size: 20px; font-weight: bold; }
.receipt-divider { border-top: 1px dashed #666; margin: 8px 0; }
.receipt-double-divider { border-top: 2px solid #111; margin: 8px 0; }
.receipt-row { display: flex; justify-content: space-between; margin: 3px 0; }
.receipt-total { font-size: 14px; font-weight: bold; }
.receipt-footer { text-align: center; margin-top: 12px; font-size: 11px; color: #555; }

/* Tabs */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
.tab-item {
  padding: 9px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  margin-bottom: -1px;
  white-space: nowrap;
}
.tab-item:hover { color: var(--text); }
.tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Responsive */
/* ============================================================
   TABLET & MOBILE — full touch-optimised layout
   ============================================================ */

/* ── Top bar (hidden on desktop) ── */
.topbar {
  display: none;
  position: fixed; top: 0; left: 0; right: 0;
  height: calc(56px + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  z-index: 200;
  align-items: center;
  padding-left: 14px;
  padding-right: 14px;
  gap: 12px;
}
.topbar-hamburger {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); cursor: pointer; font-size: 20px;
  flex-shrink: 0;
}
.topbar-logo { font-family: var(--sans); font-weight: 800; font-size: 16px; flex: 1; }
.topbar-daily {
  display: flex; flex-direction: column; align-items: flex-end;
  font-family: var(--mono); line-height: 1.2;
}
.topbar-daily-rev { font-size: 14px; font-weight: 700; color: var(--accent); }
.topbar-daily-cnt { font-size: 10px; color: var(--text3); }
.topbar-eod {
  width: 44px; height: 44px;
  background: var(--accent); border: none; border-radius: var(--radius);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── Sidebar overlay (mobile) ── */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 150;
  backdrop-filter: blur(2px);
}
.sidebar-overlay.show { display: block; }

/* ── Cart drawer (mobile POS) ── */
.cart-drawer-toggle {
  display: none;
  position: fixed; bottom: 16px; right: 16px;
  z-index: 120;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 28px;
  padding: 0 20px;
  height: 54px;
  font-size: 14px;
  font-weight: 800;
  font-family: var(--sans);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(232,160,32,0.5);
  align-items: center; gap: 8px;
  transition: transform 0.15s;
}
.cart-drawer-toggle:active { transform: scale(0.97); }
.cart-drawer-badge {
  background: #000;
  color: var(--accent);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 800;
}

.cart-drawer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  backdrop-filter: blur(2px);
}
.cart-drawer-overlay.show { display: block; }

.cart-drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 2px solid var(--accent);
  border-radius: 20px 20px 0 0;
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height: 88vh;
  display: flex; flex-direction: column;
}
.cart-drawer.open { transform: translateY(0); }
.cart-drawer-handle {
  width: 40px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}

/* ── Tablet ≤ 900px ── */
@media (max-width: 900px) {
  .topbar { display: flex; }
  .main-content { margin-left: 0; padding-top: calc(56px + env(safe-area-inset-top)); }
  .sidebar { transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); z-index: 160; width: 270px; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 32px rgba(0,0,0,0.6); }
  .nav-item { padding: 13px 18px; font-size: 15px; }
  .nav-item .icon { font-size: 20px; }
  .btn { min-height: 44px; }
  .btn-sm { min-height: 38px; }
  .btn-icon { width: 44px; height: 44px; }
  .form-control { min-height: 46px; font-size: 16px; }
  select.form-control { min-height: 46px; }
  .qty-btn { width: 38px; height: 38px; font-size: 18px; }
  .qty-val { font-size: 16px; width: 36px; }
  .qty-val-input { font-size: 15px; width: 44px; }
  .page-header { padding: 16px 16px 0; }
  .page-body { padding: 14px 16px 100px; }
  .pos-layout { flex-direction: column; height: auto; }
  .pos-cart { display: none; }
  .pos-products-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; }
  .cart-drawer-toggle { display: flex; }
  .hide-mobile { display: none !important; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .stat-value { font-size: 20px; }
  .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
  .modal { max-width: 100% !important; margin: 0; border-radius: 18px 18px 0 0; position: fixed; bottom: 0; left: 0; right: 0; max-height: 94vh; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .products-grid-admin { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
  .eod-breakdown { grid-template-columns: 1fr; }
  .filter-row { gap: 8px; }
  .search-bar { min-width: 0; }
  .page-title { font-size: 18px; }
  .page-header { flex-wrap: wrap; gap: 10px; }
  .page-actions { flex-wrap: wrap; }
  /* Transfer new tab: stack layout */
  .transfer-layout { flex-direction: column !important; }
  .transfer-summary-panel { width: 100% !important; }
}

/* ── Phone ≤ 480px ── */
@media (max-width: 480px) {
  /* Topbar */
  .topbar { height: calc(52px + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top); padding-left: 10px; padding-right: 10px; gap: 8px; }
  .topbar-logo { font-size: 14px; }
  .topbar-daily { display: none; }
  .topbar-hamburger { width: 40px; height: 40px; font-size: 18px; }
  .topbar-eod { width: 40px; height: 40px; font-size: 16px; }
  .main-content { padding-top: calc(52px + env(safe-area-inset-top)); }

  /* Page */
  .page-header { padding: 12px 12px 0; gap: 8px; }
  .page-title { font-size: 17px; }
  .page-subtitle { font-size: 11px; }
  .page-body { padding: 10px 12px 90px; }

  /* Stats: 2 columns, smaller */
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { padding: 12px 14px; }
  .stat-value { font-size: 18px; }
  .stat-label { font-size: 10px; }
  .stat-change { font-size: 10px; }
  .stat-icon { font-size: 22px; }

  /* Cards */
  .card { padding: 12px; border-radius: 10px; }

  /* Tables: compact, scroll */
  table { font-size: 12px; }
  thead th { padding: 8px 10px; font-size: 10px; }
  tbody td { padding: 9px 10px; }

  /* Buttons */
  .btn { min-height: 42px; padding: 8px 14px; font-size: 13px; }
  .btn-sm { min-height: 36px; padding: 5px 10px; font-size: 12px; }
  .btn-lg { min-height: 50px; font-size: 15px; }
  .btn-icon { width: 42px; height: 42px; }

  /* Forms */
  .form-control { min-height: 46px; font-size: 16px; border-radius: 8px; }
  .form-label { font-size: 11px; }
  .form-group { margin-bottom: 12px; }

  /* POS */
  .pos-products-grid { grid-template-columns: repeat(3,1fr); gap: 7px; }
  .product-card-pos { padding: 7px 6px; border-radius: 8px; }
  .pos-product-img { font-size: 26px; aspect-ratio: 1; border-radius: 6px; }
  .pos-product-name { font-size: 10.5px; line-height: 1.2; }
  .pos-product-price { font-size: 11px; }
  .pos-product-stock { font-size: 10px; }

  /* Cart drawer */
  .cart-drawer { border-radius: 18px 18px 0 0; }
  .cart-drawer-toggle { bottom: 12px; right: 12px; height: 50px; padding: 0 16px; font-size: 13px; }
  .cart-item { padding: 8px 7px; gap: 6px; }
  .cart-item-name { font-size: 12px; }
  .cart-item-name small { font-size: 10px; }
  .cart-item-total { font-size: 12px; min-width: 52px; }
  .qty-btn { width: 34px; height: 34px; font-size: 16px; }
  .qty-val { width: 28px; font-size: 14px; }
  .cart-footer { padding: 10px 12px; }
  .cart-total-row { font-size: 16px; }
  .type-btn { padding: 5px 10px; font-size: 11px; }

  /* Modals */
  .modal { max-height: 96vh; border-radius: 16px 16px 0 0; }
  .modal-header { padding: 14px 16px; }
  .modal-title { font-size: 15px; }
  .modal-body { padding: 14px 16px; }
  .modal-footer { padding: 12px 16px; gap: 8px; }

  /* EOD modal */
  .eod-header-band { padding: 16px 14px 14px; }
  .eod-store-name { font-size: 16px; }
  .eod-body { padding: 14px 14px; }
  .eod-stats-row { grid-template-columns: repeat(3,1fr); gap: 7px; }
  .eod-stat-box { padding: 10px 6px; }
  .eod-stat-box-val { font-size: 16px; }
  .eod-breakdown-val { font-size: 15px; }

  /* Products grid admin */
  .products-grid-admin { grid-template-columns: repeat(2,1fr); gap: 8px; }
  .pca-img { height: 110px; font-size: 32px; }
  .pca-name { font-size: 12px; }

  /* Tables hide extra cols */
  .hide-phone { display: none !important; }

  /* Tabs */
  .tabs { gap: 0; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-item { padding: 9px 10px; font-size: 18px; white-space: nowrap; }
  .tab-text { display: none; }

  /* Filter row */
  .filter-row { gap: 7px; }
  .filter-row select.form-control { font-size: 14px; }

  /* Sidebar */
  .sidebar { width: 100%; max-width: 300px; }
  .sidebar-daily { padding: 10px 14px; }
  .eod-btn { min-height: 40px; font-size: 12px; }

  /* Chart */
  .chart-bar-label { width: 72px; font-size: 11px; }

  /* Transfer page */
  .transfer-layout { flex-direction: column !important; }
  .transfer-summary-panel { width: 100% !important; position: static !important; }
}

/* Chart bars */
.chart-bar-group { display: flex; flex-direction: column; gap: 8px; }
.chart-bar-row { display: flex; align-items: center; gap: 10px; }
.chart-bar-label { width: 90px; font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chart-bar-track { flex: 1; background: var(--bg3); border-radius: 4px; height: 22px; overflow: hidden; }
.chart-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
.chart-bar-val { font-size: 11px; font-family: var(--mono); font-weight: 600; color: #000; white-space: nowrap; }

/* Stock color classes */
.stock-ok { color: var(--green); }
.stock-low { color: var(--accent); }
.stock-out { color: var(--red); }

/* Toggle switch */
.toggle-wrap { display: flex; align-items: center; gap: 10px; }
.toggle {
  width: 40px; height: 22px;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 11px;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle-thumb {
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.toggle.on .toggle-thumb { transform: translateX(18px); }

/* Quantity input */
.qty-input { width: 64px; }

.page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* filter row */
.filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }

/* product grid admin */
.products-grid-admin { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.product-card-admin {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
  transition: border-color 0.15s;
}
.product-card-admin:hover { border-color: var(--border2); }
.pca-img { width: 100%; height: 150px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
.pca-img img { width: 100%; height: 100%; object-fit: cover; }
.pca-body { padding: 12px; }
.pca-name { font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.pca-sku { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 8px; }
.pca-prices { display: flex; gap: 10px; margin-bottom: 8px; }
.pca-price { font-family: var(--mono); font-size: 12px; }
.pca-price-label { font-size: 10px; color: var(--text3); }
.pca-price-val { font-weight: 700; color: var(--accent); }
.pca-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-top: 1px solid var(--border); gap: 8px; }

/* Pagination */
.pagination { display: flex; gap: 4px; align-items: center; justify-content: center; margin-top: 16px; }
.page-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  transition: all 0.1s;
  font-family: var(--mono);
}
.page-btn:hover { background: var(--bg4); }
.page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Misc */
.text-right { text-align: right; }
.text-center { text-align: center; }
.text-muted { color: var(--text3); }
.fw-bold { font-weight: 700; }
.fw-mono { font-family: var(--mono); }
.d-flex { display: flex; }
.align-center { align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.w-full { width: 100%; }
.flex-1 { flex: 1; }
.hidden { display: none; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
  gap: 12px;
}
.empty-state .icon { font-size: 48px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* Customer search */
.customer-suggestions {
  position: absolute;
  top: 100%; left: 0; right: 0;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  margin-top: 2px;
  z-index: 100;
  max-height: 160px;
  overflow-y: auto;
}
.customer-suggestion-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.1s;
}
.customer-suggestion-item:hover { background: var(--bg4); }

/* End of Day */
.sidebar-daily {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  background: linear-gradient(135deg, rgba(232,160,32,0.08) 0%, transparent 100%);
  flex-shrink: 0;
}
.daily-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.daily-stats { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
.daily-stat-row { display: flex; justify-content: space-between; align-items: center; }
.daily-stat-name { font-size: 11px; color: var(--text2); }
.daily-stat-val { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); }
.daily-stat-val.count { color: var(--green); }
.eod-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent) 0%, #d4870c 100%);
  color: #000;
  border: none;
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;

const toDate = (v) => {
  if (!v) return new Date(0);
  if (v.seconds != null) return new Date(v.seconds * 1000); // Firestore Timestamp
  return new Date(v); // ISO string veya number
};

const BarcodeUtil = {
  // EAN-13 check digit hesapla
  ean13Check: (digits12) => {
    let sum = 0;
    for (let i = 0; i < 12; i++) {
      sum += parseInt(digits12[i]) * (i % 2 === 0 ? 1 : 3);
    }
    return (10 - (sum % 10)) % 10;
  },

  // Otomatik EAN-13 üret (869 + 9 random digit + check)
  generateEAN13: () => {
    const prefix = '869'; // Azerbaycan GS1 prefix
    let digits = prefix;
    for (let i = 0; i < 9; i++) digits += Math.floor(Math.random() * 10);
    digits += BarcodeUtil.ean13Check(digits);
    return digits;
  },

  // EAN-13 geçerli mi?
  isValidEAN13: (code) => {
    if (!code || code.length !== 13 || !/^\d{13}$/.test(code)) return false;
    return parseInt(code[12]) === BarcodeUtil.ean13Check(code.slice(0, 12));
  },

  // Canvas'a barkod çiz, base64 PNG döndür
  toBase64: (code, opts) => {
    try {
      const canvas = document.createElement('canvas');
      if (!window.JsBarcode) return null;
      window.JsBarcode(canvas, code, Object.assign({
        format: 'EAN13',
        width: 2,
        height: 50,
        displayValue: true,
        fontSize: 12,
        margin: 4,
        background: '#ffffff',
        lineColor: '#000000',
      }, opts || {}));
      return canvas.toDataURL('image/png');
    } catch(e) { console.error('Barcode error:', e); return null; }
  }
};

// Generate sample sales
function generateSeedSales() {
  const sales = [];
  const now = Date.now();
  const day = 86400000;
  const types = ['retail', 'wholesale'];
  const items = [
    { productId: 'p1', productName: 'Coca Cola 330ml', sku: 'ICK-001' },
    { productId: 'p2', productName: 'Su 1.5L', sku: 'ICK-002' },
    { productId: 'p3', productName: 'Lays Klasik 100g', sku: 'ATK-001' },
    { productId: 'p4', productName: 'Çay 500g', sku: 'GDA-001' },
    { productId: 'p8', productName: 'Pil AA (4\'lü)', sku: 'ELK-001' },
  ];
  const priceMap = { p1: [15,12], p2: [6,4.5], p3: [18,14], p4: [75,60], p8: [55,44] };
  
  for (let i = 0; i < 42; i++) {
    const type = types[Math.floor(Math.random() * 2)];
    const daysAgo = Math.floor(Math.random() * 30);
    const numItems = Math.floor(Math.random() * 3) + 1;
    const saleItems = [];
    let total = 0;
    const usedProducts = new Set();
    for (let j = 0; j < numItems; j++) {
      const item = items[Math.floor(Math.random() * items.length)];
      if (usedProducts.has(item.productId)) continue;
      usedProducts.add(item.productId);
      const prices = priceMap[item.productId];
      const price = type === 'retail' ? prices[0] : prices[1];
      const qty = Math.floor(Math.random() * 4) + 1;
      const lineTotal = price * qty;
      total += lineTotal;
      saleItems.push({ ...item, qty, price, lineTotal });
    }
    if (saleItems.length === 0) continue;
    const custIdx = Math.random() > 0.6 ? Math.floor(Math.random() * 3) : -1;
    sales.push({
      id: 's' + i,
      receiptNo: 'FIS-' + (10000000 + i),
      type,
      items: saleItems,
      total,
      discount: 0,
      customerName: custIdx >= 0 ? SEED_CUSTOMERS[custIdx].name : '',
      customerPhone: custIdx >= 0 ? SEED_CUSTOMERS[custIdx].phone : '',
      cashierName: i % 3 === 0 ? 'Kassir Əhməd' : 'Admin İstifadəçi',
      cashierId: i % 3 === 0 ? 'u2' : 'u1',
      notes: '',
      createdAt: new Date(now - daysAgo * day - Math.floor(Math.random() * 8 * 3600000)).toISOString(),
    });
  }
  return sales.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}

  const [returns, setReturns] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [toasts, setToasts] = useState([]);

  // Persist changes (localStorage — categories, customers, settings, transfers lokal kalır)

  useEffect(() => { Storage.set('categories', categories); }, [categories]);
  useEffect(() => { Storage.set('customers', customers); }, [customers]);
  useEffect(() => { Storage.set('settings', settings); }, [settings]);
  useEffect(() => { Storage.set('transfers', transfers); }, [transfers]);

  // ── Firebase Auth state observer ──────────────────────────────
  useEffect(() => {
    const unsub = fbOnAuthChange(async (firebaseUser) => {
      if (firebaseUser) {
        const storeData = await fbGetStoreData().catch(() => null);
        setCurrentUser({
          id:       firebaseUser.uid,
          uid:      firebaseUser.uid,
          username: firebaseUser.email,
          email:    firebaseUser.email,
          name:     storeData?.ownerName || firebaseUser.displayName || firebaseUser.email,
          role:     storeData?.role || 'admin',
          active:   true,
        });
        setSettings(storeData?.settings ? { ...SEED_SETTINGS, ...storeData.settings } : SEED_SETTINGS);
      } else {
        setCurrentUser(null);
        setSettings(SEED_SETTINGS);
      }
      setAuthReady(true);
    });
    return unsub;
  }, []);

  // ── Real-time product stream ──────────────────────────────────
  useEffect(() => {
    if (!currentUser?.uid) return;
    return fbStreamProducts(prods => setProducts(prods));
  }, [currentUser?.uid]);

  // ── Real-time sales stream ────────────────────────────────────
  useEffect(() => {
    if (!currentUser?.uid) return;
    return fbStreamSales(s => {
      setSales(s);
    });
  }, [currentUser?.uid]);

  // ── Real-time returns stream ──────────────────────────────────
  useEffect(() => {
    if (!currentUser?.uid) return;
    return fbStreamReturns(r => setReturns(r));
  }, [currentUser?.uid]);

  // ── Migration: Fix returns without ownerId ───────────────────
  useEffect(() => {
    if (!currentUser?.uid) return;
    const fixReturns = async () => {
      try {
        const snap = await fbDB.collection('returns').where('ownerId', '==', null).get();
        const batch = fbDB.batch();
        for (const doc of snap.docs) {
          batch.update(doc.ref, { ownerId: currentUser.uid });
        }
        if (!snap.empty) await batch.commit();
      } catch (err) {
        console.error('[Migration] fixReturns:', err);
      }
    };
    fixReturns();
  }, [currentUser?.uid]);

  const addToast = useCallback((msg, type = 'success') => {
    const id = genId();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  // Auth
  const login = useCallback(async (email, password) => {
    return fbLogin(email, password);
  }, []);
  const logout = useCallback(() => { fbLogout(); }, []);

  // Products — Firebase'e yaz, state onSnapshot ile güncellenir
  const saveProduct = useCallback(async (p) => {
    await fbSaveProduct(p);
  }, []);
  const deleteProduct = useCallback(async (id) => {
    await fbDeleteProduct(id);
  }, []);

  // Sales
  const completeSale = useCallback((cart, saleType, customerName, customerPhone, notes, cashier, discount = 0, cashReceived, isCredit = false) => {
    // 1. Stok doğrulama
    for (const item of cart) {
      const p = products.find(x => x.id === item.productId);
      if (!p) return { ok: false, error: `Ürün bulunamadı: ${item.productName}` };
      if (p.stock < item.qty) return { ok: false, error: `Yetersiz stok: ${p.name} (Mevcut: ${p.stock})` };
    }

    // 2. Satış kaydı oluştur
    const total = cart.reduce((s, i) => s + i.lineTotal, 0) - discount;
    const sale = {
      id: genId(),
      receiptNo: genReceiptNo(),
      type: saleType,
      items: cart,
      total,
      discount,
      customerName,
      customerPhone,
      cashierName: cashier.name,
      cashierId: cashier.id,
      notes,
      createdAt: new Date().toISOString(),
      isCredit,
      ...(cashReceived != null ? { cashReceived, change: cashReceived - total } : {}),
    };

    // 3. Optimistic: stok düş + satışı hemen geçmişe ekle
    setProducts(prev => prev.map(p => {
      const item = cart.find(c => c.productId === p.id);
      if (!item) return p;
      return {
        ...p,
        stock: p.stock - item.qty,
        warehouseStock: Math.max(0, (p.warehouseStock || 0) - item.qty),
        updatedAt: new Date().toISOString(),
      };
    }));
    // Satışı anında geçmişe ekle (Firestore stream beklemeden)
    setSales(prev => [sale, ...prev]);

    // 4. Müşteri kaydet
    if (customerName) {
      setCustomers(prev => {
        const exists = prev.find(c => c.phone === customerPhone && customerPhone);
        if (!exists) return [...prev, { id: genId(), name: customerName, phone: customerPhone, createdAt: new Date().toISOString() }];
        return prev.map(c => c.phone === customerPhone ? { ...c, name: customerName } : c);
      });
    }

    // 5. Firestore'a atomik batch yaz (warehouseStock da dahil — ayrı update yok, race condition önlendi)
    const itemsWithWarehouse = cart.map(item => {
      const p = products.find(x => x.id === item.productId);
      return { ...item, _curWarehouseStock: p?.warehouseStock || 0 };
    });
    fbCompleteSale({ ...sale, items: itemsWithWarehouse })
      .catch(err => console.error('[FB] completeSale:', err));

    return { ok: true, sale };
  }, [products]);

  // Categories
  const saveCategory = useCallback((cat) => {
    setCategories(prev => {
      const exists = prev.find(x => x.id === cat.id);
      return exists ? prev.map(x => x.id === cat.id ? cat : x) : [...prev, { ...cat, id: genId() }];
    });
  }, []);
  const deleteCategory = useCallback((id) => { setCategories(prev => prev.filter(x => x.id !== id)); }, []);

  // Users
  const saveUser = useCallback((u) => {
    setUsers(prev => {
      const exists = prev.find(x => x.id === u.id);
      return exists ? prev.map(x => x.id === u.id ? u : x) : [...prev, { ...u, id: genId(), createdAt: new Date().toISOString() }];
    });
  }, []);
  const deleteUser = useCallback((id) => { setUsers(prev => prev.filter(x => x.id !== id)); }, []);

  // Settings
  const saveSettings = useCallback((s) => {
    setSettings(s);
    fbSaveStoreData({ settings: s, ownerName: s.storeName || '' }).catch(err => console.error('[FB] saveSettings:', err));
  }, []);

  // Sales management
  const deleteSale = useCallback((id) => {
    setSales(prev => prev.filter(x => x.id !== id));
    fbDeleteSale(id).catch(err => console.error('[FB] deleteSale:', err));
  }, []);
  const clearSalesByFilter = useCallback((filterFn) => {
    setSales(prev => {
      const toDelete = prev.filter(s => filterFn(s));
      toDelete.forEach(s => fbDeleteSale(s.id).catch(err => console.error('[FB] clearSales:', err)));
      return prev.filter(s => !filterFn(s));
    });
  }, []);
  const updateSaleCustomer = useCallback((id, customerName, customerPhone) => {
    setSales(prev => prev.map(s => s.id === id ? { ...s, customerName, customerPhone } : s));
    fbUpdateSaleCustomer(id, customerName, customerPhone)
      .catch(err => { console.error('[FB] updateSaleCustomer:', err); addToast('Xəta: müştəri məlumatı saxlanmadı.', 'error'); });
  }, []);
  const deleteTransfer = useCallback((id) => { setTransfers(prev => prev.filter(x => x.id !== id)); }, []);
  const clearAllTransfers = useCallback(() => { setTransfers([]); }, []);

  // Transfer: Depo → Market (Bug 3 fix: Firestore'a yaz)
  const transferToShop = useCallback((items, note, user) => {
    for (const item of items) {
      const p = products.find(x => x.id === item.productId);
      if (!p) return { ok: false, error: `Ürün bulunamadı.` };
      if ((p.warehouseStock || 0) < item.qty) return { ok: false, error: `Depoda yetersiz stok: ${p.name} (Depo: ${p.warehouseStock || 0})` };
    }
    // Güncellenmiş ürünleri hesapla
    const updatedProds = {};
    const newArr = products.map(p => {
      const item = items.find(i => i.productId === p.id);
      if (!item) return p;
      const updated = {
        ...p,
        warehouseStock: (p.warehouseStock || 0) - item.qty,
        stock: (p.stock || 0) + item.qty,
        updatedAt: new Date().toISOString(),
      };
      updatedProds[p.id] = updated;
      return updated;
    });
    setProducts(newArr);
    // Firestore'a yaz (fire-and-forget)
    Object.values(updatedProds).forEach(p =>
      fbSaveProduct(p).catch(err => console.error('[FB] transferToShop:', err))
    );
    // Transfer logu
    const transfer = {
      id: genId(),
      items: items.map(i => {
        const p = products.find(x => x.id === i.productId);
        return { ...i, productName: p?.name || '?', sku: p?.sku || '' };
      }),
      note: note || '',
      userName: user?.name || '?',
      userId: user?.id || '',
      createdAt: new Date().toISOString(),
    };
    setTransfers(prev => [transfer, ...prev]);
    return { ok: true, transfer };
  }, [products]);

  // Warehouse stock direct update (admin)
  // Bug 3+4 fix: local state + Firestore'a yaz → refresh sonrası kaybolmaz
  const updateWarehouseStock = useCallback((productId, qty) => {
    const prod = products.find(p => p.id === productId);
    if (!prod) return;
    const updated = { ...prod, warehouseStock: qty, updatedAt: new Date().toISOString() };
    setProducts(prev => prev.map(p => p.id === productId ? updated : p));
    fbSaveProduct(updated).catch(err => console.error('[FB] updateWarehouseStock:', err));
  }, [products]);

  // İade işlemi
  const processReturn = useCallback((saleId, returnItems, user) => {
    // returnItems = [{ productId, productName, sku, qty, price, lineTotal }]
    const sale = sales.find(s => s.id === saleId);
    if (!sale) return { ok: false, error: 'Satış bulunamadı.' };
    // Check not already fully returned
    const existingReturns = returns.filter(r => r.saleId === saleId);
    const alreadyReturnedQty = {};
    existingReturns.forEach(r => r.items.forEach(i => {
      alreadyReturnedQty[i.productId] = (alreadyReturnedQty[i.productId] || 0) + i.qty;
    }));
    for (const item of returnItems) {
      const saleItem = sale.items.find(i => i.productId === item.productId);
      const maxReturnable = (saleItem?.qty || 0) - (alreadyReturnedQty[item.productId] || 0);
      if (item.qty > maxReturnable) return { ok: false, error: `${item.productName} için iade miktarı fazla. (Max: ${maxReturnable})` };
    }
    // Add stock back
    setProducts(prev => prev.map(p => {
      const ri = returnItems.find(i => i.productId === p.id);
      return ri ? { ...p, stock: p.stock + ri.qty, updatedAt: new Date().toISOString() } : p;
    }));
    // Save return record
    const returnTotal = returnItems.reduce((a, i) => a + i.lineTotal, 0);
    const ret = {
      id: genId(),
      returnNo: 'IAD-' + Date.now().toString().slice(-8),
      saleId,
      receiptNo: sale.receiptNo,
      saleType: sale.type,
      items: returnItems,
      total: returnTotal,
      customerName: sale.customerName || '',
      customerPhone: sale.customerPhone || '',
      cashierName: user?.name || '?',
      cashierId: user?.id || '',
      createdAt: new Date().toISOString(),
    };
    fbSaveReturn(ret)
      .then(() => {
        setReturns(prev => [ret, ...prev]);
      })
      .catch(err => {
        console.error('[FB] processReturn:', err);
        addToast('İade saxlanıla bilmədi.', 'error');
      });
    return { ok: true, ret };
  }, [sales, returns, products, addToast]);

  const deleteReturn = useCallback((id) => {
    const prevReturns = [...returns];
    fbDeleteReturn(id)
      .then(() => {
        setReturns(prev => prev.filter(x => x.id !== id));
        addToast('İade silindi.', 'success');
      })
      .catch(err => {
        console.error('[FB] deleteReturn:', err);
        addToast('İade silinə bilmədi: ' + (err.message || 'Xəta'), 'error');
        setReturns(prevReturns);
      });
  }, [addToast, returns]);

  const value = {
    users, categories, products, sales, customers, settings, transfers, returns, currentUser, authReady,
    login, logout, saveProduct, deleteProduct, completeSale,
    saveCategory, deleteCategory, saveUser, deleteUser, saveSettings,
    deleteSale, clearSalesByFilter, updateSaleCustomer,
    deleteTransfer, clearAllTransfers,
    transferToShop, updateWarehouseStock,
    processReturn, deleteReturn,
    addToast, toasts,
  };
  return React.createElement(AppContext.Provider, { value }, children);
}

// Modal wrapper
function Modal({ show, onClose, title, children, size = '' }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    if (show) document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [show, onClose]);
  if (!show) return null;
  return React.createElement('div', { className: 'modal-overlay', onClick: (e) => { if (e.target === e.currentTarget) onClose(); } },
    React.createElement('div', { className: `modal${size ? ' modal-' + size : ''}` },
      React.createElement('div', { className: 'modal-header' },
        React.createElement('span', { className: 'modal-title' }, title),
        React.createElement('button', { className: 'btn btn-ghost btn-icon', onClick: onClose }, '✕')
      ),
      children
    )
  );
}

// Confirm dialog
function useConfirm() {
  const [state, setState] = useState({ show: false, msg: '', resolve: null });
  const confirm = (msg) => new Promise(resolve => setState({ show: true, msg, resolve }));
  const Dialog = () => !state.show ? null : React.createElement(Modal, { show: true, onClose: () => { state.resolve(false); setState({ show: false }); }, title: 'Onay' },
    React.createElement('div', { className: 'modal-body' }, React.createElement('p', null, state.msg)),

      React.createElement('button', { className: 'btn btn-danger', onClick: () => { state.resolve(true); setState({ show: false }); } }, 'Sil')
    )
  );
  return { confirm, Dialog };
}

                  (() => {
                    const seen = new Set();
                    const rows = [];
                    for (const p of [...outOfStock, ...lowStock, ...outOfWarehouseStock, ...lowWarehouseStock]) {
                      if (seen.has(p.id)) continue;
                      seen.add(p.id);
                      const shopAlert = p.stock === 0 ? 'Tükəndi' : p.stock <= p.minStock ? 'Az' : null;
                      const whAlert = p.warehouseStock === 0 ? 'Tükəndi' : p.warehouseStock <= (p.minWarehouseStock || 10) ? 'Az' : null;
                      rows.push(React.createElement('tr', { key: p.id },
                        React.createElement('td', null, p.name),
                        React.createElement('td', { className: 'fw-mono' }, p.stock,
                          shopAlert && React.createElement('span', { className: `badge ${p.stock === 0 ? 'badge-red' : 'badge-yellow'}`, style: { marginLeft: 4 } }, shopAlert)
                        ),
                        React.createElement('td', { className: 'fw-mono' }, p.warehouseStock,

                        ),
                        React.createElement('td', null,
                          (p.stock === 0 || p.warehouseStock === 0)
                            ? React.createElement('span', { className: 'badge badge-red' }, 'Kritik')
                            : React.createElement('span', { className: 'badge badge-yellow' }, 'Az')
                        )
                      ));
                    }
                    return rows.slice(0, 10);
                  })()
                )
              )
            )
        )
      )
    )
  );
}

function POSPage() {
  const { products, categories, completeSale, currentUser, settings, addToast } = useApp();
  const [cart, setCart] = useState([]);
  const [saleType, setSaleType] = useState('retail');
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [customerName, setCustomerName] = useState('');
  const [customerPhone, setCustomerPhone] = useState('');
  const [notes, setNotes] = useState('');
  const [discount, setDiscount] = useState(0);
  const [rawQty, setRawQty] = useState({});
  const [completedSale, setCompletedSale] = useState(null);
  const [showReceipt, setShowReceipt] = useState(false);
  const [cartDrawerOpen, setCartDrawerOpen] = useState(false);
  const [editingPrice, setEditingPrice] = useState(null); // productId being edited
  const [editPriceVal, setEditPriceVal] = useState('');
  const [cashReceived, setCashReceived] = useState('');
  const [isCredit, setIsCredit] = useState(false);
  const barcodeRef = useRef(null);
  const barcodeBuffer = useRef('');       // accumulates chars from scanner
  const barcodeTimer = useRef(null);      // clears buffer after pause
  const lastKeyTime = useRef(0);          // tracks typing speed
  const cur = settings.currency || '₼';
  const isAdmin = currentUser?.role === 'admin';

  const activeProducts = products.filter(p => p.active);
  const filtered = activeProducts.filter(p => {
    const q = search.toLowerCase();
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || p.barcode.includes(q);
    const matchCat = !filterCat || p.categoryId === filterCat;
    return matchSearch && matchCat;
  });

  const getPrice = (p) => saleType === 'retail' ? p.retailPrice : p.wholesalePrice;

  const addToCart = (product) => {
    if (product.stock === 0) { addToast('Bu məhsul tükənmişdir!', 'error'); return; }
    setCart(prev => {
      const exists = prev.find(x => x.productId === product.id);
      if (exists) {
        if (exists.qty >= product.stock) { addToast('Maksimum stok hədinə çatdınız!', 'warning'); return prev; }
        return prev.map(x => x.productId === product.id ? { ...x, qty: x.qty + 1, lineTotal: (x.qty + 1) * getPrice(product) } : x);
      }
      const price = getPrice(product);
      return [...prev, { productId: product.id, productName: product.name, sku: product.sku, qty: 1, price, lineTotal: price }];
    });
  };

  const updateQty = (productId, delta) => {
    setCart(prev => prev.map(x => {
      if (x.productId !== productId) return x;
      const product = products.find(p => p.id === productId);
      const newQty = x.qty + delta;
      if (newQty <= 0) return null;
      if (newQty > product.stock) { addToast('Stok kifayət etmir!', 'warning'); return x; }
      return { ...x, qty: newQty, lineTotal: newQty * x.price };
    }).filter(Boolean));
  };

  const setQtyDirect = (productId, value) => {
    const n = parseInt(value, 10);
    if (isNaN(n) || n < 0) return;
    if (n === 0) { removeFromCart(productId); return; }
    setCart(prev => prev.map(x => {
      if (x.productId !== productId) return x;
      const product = products.find(p => p.id === productId);
      if (n > product.stock) { addToast('Stok kifayət etmir!', 'warning'); return { ...x, qty: product.stock, lineTotal: product.stock * x.price }; }
      return { ...x, qty: n, lineTotal: n * x.price };
    }));
  };

  const removeFromCart = (productId) => { setCart(prev => prev.filter(x => x.productId !== productId)); };

  // Manual price override (admin only)
  const startEditPrice = (item) => {
    setEditingPrice(item.productId);
    setEditPriceVal(item.price.toString());
  };
  const cancelEditPrice = () => { setEditingPrice(null); setEditPriceVal(''); };

    const newPrice = parseFloat(editPriceVal);
    if (isNaN(newPrice) || newPrice < 0) { addToast('Yanlış qiymət!', 'error'); return; }
    setCart(prev => prev.map(item => {
      if (item.productId !== productId) return item;
      return { ...item, price: newPrice, manualPrice: true, originalPrice: item.manualPrice ? item.originalPrice : item.price, lineTotal: item.qty * newPrice };
    }));
    setEditingPrice(null);
    addToast('Qiymət yeniləndi.', 'success');
  };

  const addToCartByBarcode = useCallback((barcode) => {

        barcodeBuffer.current = '';
        clearTimeout(barcodeTimer.current);
        addToCartByBarcode(code);
      }
      // else: normal Enter, do nothing special
      barcodeBuffer.current = '';
      return;
    }

    // Single printable character
    if (e.key.length === 1) {
      // Fast typing (< 80ms) → scanner
      if (gap < 80) {
        barcodeBuffer.current += e.key;
      } else {
        // Slow typing → manual keyboard, reset buffer
        barcodeBuffer.current = e.key;
      }
      // Auto-clear buffer after 300ms pause

    }

// QZ TRAY — Termal Yazıcı Yardımcısı
// ============================================================
const QZPrinter = {
  // QZ Tray kurulu ve çalışıyor mu?
  isAvailable: () => typeof window.qz !== 'undefined' && window.qz,

  // QZ'ye bağlan
  connect: async () => {
    if (!QZPrinter.isAvailable()) return false;
    try {
      if (!window.qz.websocket.isActive()) {
        await window.qz.websocket.connect({ retries: 1, delay: 1 });
      }
      return true;
    } catch (e) { console.warn('QZ bağlantı hatası:', e); return false; }
  },

  // Bağlı yazıcıları listele
  getPrinters: async () => {
    try {
      const connected = await QZPrinter.connect();
      if (!connected) return [];
      return await window.qz.printers.find();
    } catch (e) { return []; }
  },

  // ESC/POS komutları ile yazdır
  printESCPOS: async (printerName, commands) => {
    const connected = await QZPrinter.connect();
    if (!connected) return false;
    try {
      const config = window.qz.configs.create(printerName, { copies: 1 });
      await window.qz.print(config, commands);
      return true;
    } catch (e) { console.error('QZ yazdırma hatası:', e); return false; }
  },

  // Türkçe/Azerbaycan karakter dönüştürücü (CP857 kodlaması için)
  tr: (s) => {
    if (!s) return '';
    // Özel karakterleri CP857 karşılığına dönüştür
    const map = {
      'ı':'i','İ':'I','ş':'s','Ş':'S','ğ':'g','Ğ':'G',
      'ü':'u','Ü':'U','ö':'o','Ö':'O','ç':'c','Ç':'C',
      // Azerbaycan
      'ə':'e','Ə':'E','ı':'i','İ':'I','ö':'o','Ö':'O',
      'ü':'u','Ü':'U','ğ':'g','Ğ':'G','ş':'s','Ş':'S',
      'ç':'c','Ç':'C','ı':'i',
      // Para birimi
      '₼':'m','₺':'TL','€':'EUR','£':'GBP'
    };
    return s.split('').map(function(c){ return map[c] || c; }).join('');
  },

  // Fişi ESC/POS komutlarına çevir
  buildESCPOS: (sale, settings, cur) => {
    const t = QZPrinter.tr; // karakter dönüştürücü
    const ESC = String.fromCharCode(27);
    const GS  = String.fromCharCode(29);
    const NL  = String.fromCharCode(10);
    // CP857 (Türkçe) charset seç: ESC t 4
    const CHARSET   = ESC + 't' + String.fromCharCode(4);
    const INIT      = ESC + '@'; // yazıcıyı sıfırla
    const CUT       = GS + 'V' + String.fromCharCode(65) + String.fromCharCode(3);
    const BOLD_ON   = ESC + 'E' + String.fromCharCode(1);
    const BOLD_OFF  = ESC + 'E' + String.fromCharCode(0);
    const ALIGN_C   = ESC + 'a' + String.fromCharCode(1);
    const ALIGN_L   = ESC + 'a' + String.fromCharCode(0);
    const SIZE_BIG  = GS  + '!' + String.fromCharCode(17);
    const SIZE_NRM  = GS  + '!' + String.fromCharCode(0);
    const DASHED    = '-'.repeat(48) + NL;
    const SOLID     = '='.repeat(48) + NL;

    const center = function(s){ return ALIGN_C + t(s) + NL + ALIGN_L; };
    const padLR  = function(l, r, w) {
      l = t(l); r = t(r); w = w || 48;
      const space = w - l.length - r.length;
      return l + (space > 0 ? ' '.repeat(space) : ' ') + r + NL;
    };
    const fmtN = function(n){
      const sym = cur === '₼' ? 'm' : cur === '₺' ? 'TL' : cur;
      return sym + n.toLocaleString('az-AZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    let data = INIT + CHARSET;
    data += ALIGN_C + BOLD_ON + SIZE_BIG + t(settings.storeName || 'Magaza') + SIZE_NRM + BOLD_OFF + NL;
    if (settings.address) data += center(settings.address);
    if (settings.phone)   data += center('Tel: ' + settings.phone);
    data += DASHED;
    data += BOLD_ON + center('SATIS QEBZI') + BOLD_OFF;
    data += DASHED + ALIGN_L;
    data += padLR('Qebz No:', sale.receiptNo);
    data += padLR('Tarix:', new Date(sale.createdAt).toLocaleDateString('az-AZ'));
    data += padLR('Saat:', new Date(sale.createdAt).toLocaleTimeString('az-AZ'));
    data += padLR('Nov:', sale.type === 'retail' ? 'Pərakəndə' : 'Topdansatış');
    data += padLR('Kassir:', sale.cashierName);
    if (sale.customerName)  data += padLR('Mustəri:', t(sale.customerName));
    if (sale.customerPhone) data += padLR('Telefon:', sale.customerPhone);
    data += DASHED;
    sale.items.forEach(function(item) {
      data += BOLD_ON + t(item.productName).slice(0, 32) + BOLD_OFF + NL;
      data += padLR('  ' + item.qty + ' x ' + fmtN(item.price), fmtN(item.lineTotal));
    });
    data += SOLID;
    if (sale.discount > 0) data += padLR('Endirim:', '-' + fmtN(sale.discount));
    data += BOLD_ON + SIZE_BIG + padLR('CƏMİ:', fmtN(sale.total), 44) + SIZE_NRM + BOLD_OFF;
    if (settings.receiptFooter) {
      data += DASHED + ALIGN_C + t(settings.receiptFooter) + NL + ALIGN_L;
    }
    data += NL + NL + NL + CUT;
    return [{ type: 'raw', format: 'plain', data: data }];
  }
};

  const [filterType, setFilterType] = useState('');

  const [showClearModal, setShowClearModal] = useState(false);
  const cur = settings.currency || '₼';
  const [page, setPage] = useState(1);
  const PER_PAGE = 20;
  const [editCustomerSale, setEditCustomerSale] = useState(null);
  const [editName, setEditName] = useState('');
  const [editPhone, setEditPhone] = useState('');

  const openEditCustomer = (s) => { setEditCustomerSale(s); setEditName(s.customerName || ''); setEditPhone(s.customerPhone || ''); };
  const saveEditCustomer = () => {
    if (!editCustomerSale) return;
    const liveSale = sales.find(s => s.id === editCustomerSale.id || s.receiptNo === editCustomerSale.receiptNo);
    if (!liveSale) { addToast('Satış tapılmadı, səhifəni yeniləyin.', 'error'); return; }
    updateSaleCustomer(liveSale.id, editName.trim(), editPhone.trim());
    if (selectedSale?.id === liveSale.id) setSelectedSale(prev => ({ ...prev, customerName: editName.trim(), customerPhone: editPhone.trim() }));
    setEditCustomerSale(null);
    addToast('Müştəri məlumatı yeniləndi.', 'success');
  };

  const filtered = sales.filter(s => {
    const q = search.toLowerCase();
    const matchSearch = !q || s.receiptNo.toLowerCase().includes(q) || (s.customerName || '').toLowerCase().includes(q) || (s.customerPhone || '').includes(q) || (s.cashierName || '').toLowerCase().includes(q);
    const matchType = !filterType || s.type === filterType;
    const matchDate = !filterDate || fmt.date(s.createdAt) === fmt.date(filterDate);
    return matchSearch && matchType && matchDate;
  });

  const pages = Math.ceil(filtered.length / PER_PAGE);
  const paged = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  // Xülasə hesablamaları (filtr aktiv olduqda)
  const hasFilter = filterDate || filterType || search;
  const grossRevenue = filtered.reduce((s, x) => s + x.total, 0);
  // Filtrə uyğun iadelər
  const filteredReturnIds = new Set(filtered.map(s => s.id));
  const filteredReturns = (returns || []).filter(r => {
    if (filterDate && !toDate(r.createdAt).toISOString().startsWith(filterDate)) return false;
    return filteredReturnIds.has(r.saleId) || !filterDate;
  });
  const totalReturnAmount = filteredReturns.reduce((s, r) => s + (r.total || 0), 0);
  const totalRevenue = grossRevenue - totalReturnAmount;
  const retailCount = filtered.filter(s => s.type === 'retail').length;
  const wholesaleCount = filtered.filter(s => s.type === 'wholesale').length;
  const retailRevenue = filtered.filter(s => s.type === 'retail').reduce((s, x) => s + x.total, 0);
  const wholesaleRevenue = filtered.filter(s => s.type === 'wholesale').reduce((s, x) => s + x.total, 0);
  // Ən çox satılan məhsullar
  const productTotals = {};
  filtered.forEach(s => s.items?.forEach(item => {
    if (!productTotals[item.productName]) productTotals[item.productName] = { qty: 0, revenue: 0 };
    productTotals[item.productName].qty += item.qty;
    productTotals[item.productName].revenue += item.lineTotal;
  }));
  const topProducts = Object.entries(productTotals).sort((a, b) => b[1].revenue - a[1].revenue).slice(0, 5);

  const handleDeleteSingle = (id) => {

function ClearSalesModal({ sales, onClear, onClose, addToast }) {
  const [mode, setMode] = useState('');
  const [beforeDate, setBeforeDate] = useState('');
  const [saleType, setSaleTypeFilter] = useState('');
  const [confirmed, setConfirmed] = useState(false);

  const getPreviewCount = () => {
    if (!mode) return 0;
    return sales.filter(s => {
      if (mode === 'all') return true;
      if (mode === 'before') return beforeDate && toDate(s.createdAt) < new Date(beforeDate);
      if (mode === 'type') return saleType && s.type === saleType;
      return false;
    }).length;
  };

  const previewCount = getPreviewCount();

  const handleClear = () => {
    if (!confirmed) { addToast('Lütfen onay kutusunu işaretleyin.', 'warning'); return; }
    if (mode === 'all') { onClear(() => true); }
    else if (mode === 'before') { onClear(s => beforeDate && toDate(s.createdAt) < new Date(beforeDate)); }
    else if (mode === 'type') { onClear(s => s.type === saleType); }
    addToast(`${previewCount} satış kaydı silindi.`, 'info');
    onClose();
  };

  const modeLabels = { all: 'Tüm satışlar', before: 'Belirli tarihten önce', type: 'Satış türüne göre' };

  return React.createElement('div', { className: 'modal-overlay', onClick: e => { if (e.target === e.currentTarget) onClose(); } },
    React.createElement('div', { className: 'modal' },

              React.createElement('label', { key: m, style: { display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: mode === m ? 'var(--red-dim)' : 'var(--bg3)', border: `1px solid ${mode === m ? 'rgba(239,68,68,0.3)' : 'var(--border)'}`, borderRadius: 'var(--radius)', cursor: 'pointer', transition: 'all 0.15s' } },
                React.createElement('input', { type: 'radio', name: 'mode', value: m, checked: mode === m, onChange: () => { setMode(m); setConfirmed(false); } }),
                React.createElement('span', { style: { fontSize: 13 } }, modeLabels[m])

        ),
        mode === 'before' && React.createElement('div', { className: 'form-group' },

          React.createElement('input', { className: 'form-control', type: 'date', value: beforeDate, onChange: e => { setBeforeDate(e.target.value); setConfirmed(false); } })
        ),

          React.createElement('label', { className: 'form-label' }, 'Satış Türü'),
          React.createElement('select', { className: 'form-control', value: saleType, onChange: e => { setSaleTypeFilter(e.target.value); setConfirmed(false); } },

          )

function TransferPage() {
  const { products, transfers, transferToShop, deleteTransfer, clearAllTransfers, currentUser, categories, settings, addToast } = useApp();
  const [activeTab, setActiveTab] = useState('new');
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [cart, setCart] = useState({}); // { productId: qty }
  const [note, setNote] = useState('');
  const [searchTransfer, setSearchTransfer] = useState('');
  const [showClearTransfer, setShowClearTransfer] = useState(false);
  const [clearConfirmed, setClearConfirmed] = useState(false);
  const cur = settings.currency || '₼';

  const activeProducts = products.filter(p => p.active);
  const filtered = activeProducts.filter(p => {
    const q = search.toLowerCase();
    return (!q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q))
      && (!filterCat || p.categoryId === filterCat);
  });

  const cartItems = Object.entries(cart).filter(([, qty]) => qty > 0).map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    return p ? { productId: id, productName: p.name, sku: p.sku, qty, warehouseStock: p.warehouseStock || 0, emoji: p.emoji } : null;
  }).filter(Boolean);

  const setQty = (productId, qty) => {
    setCart(prev => ({ ...prev, [productId]: Math.max(0, qty) }));
  };

  const handleTransfer = () => {
    if (cartItems.length === 0) { addToast('Transfer listesi boş!', 'error'); return; }
    const items = cartItems.map(i => ({ productId: i.productId, qty: i.qty }));
    const result = transferToShop(items, note, currentUser);
    if (!result.ok) { addToast(result.error, 'error'); return; }
    setCart({});

// ============================================================
function ReturnModal({ sale, returns, onReturn, currentUser, settings, onClose, addToast }) {
  const cur = settings.currency || '₼';

  // Calculate already-returned quantities for this sale
  const alreadyReturned = {};
  returns.filter(r => r.saleId === sale.id).forEach(r =>
    r.items.forEach(i => { alreadyReturned[i.productId] = (alreadyReturned[i.productId] || 0) + i.qty; })
  );

  // Return qty state per product
  const [qtys, setQtys] = useState(() => {
    const init = {};
    sale.items.forEach(i => { init[i.productId] = 0; });
    return init;
  });

  const setQty = (productId, val, max) => {
    setQtys(prev => ({ ...prev, [productId]: Math.max(0, Math.min(max, val)) }));
  };

  const returnItems = sale.items
    .filter(i => qtys[i.productId] > 0)
    .map(i => ({ ...i, qty: qtys[i.productId], lineTotal: i.price * qtys[i.productId] }));

  const returnTotal = returnItems.reduce((a, i) => a + i.lineTotal, 0);

  const handleSubmit = () => {
    if (returnItems.length === 0) { addToast('En az bir ürün seçin.', 'error'); return; }
    const result = onReturn(sale.id, returnItems, currentUser);
    if (!result.ok) { addToast(result.error, 'error'); return; }
    addToast('İade tamamlandı! İade No: ' + result.ret.returnNo, 'success');
    onClose();
  };

  return React.createElement(Modal, { show: true, onClose, title: '↩️ İade İşlemi', size: '' },
    React.createElement('div', { className: 'modal-body' },
      // Sale info header
      React.createElement('div', { style: { background: 'var(--bg3)', borderRadius: 8, padding: '10px 14px', marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 } },
        React.createElement('div', null,
          React.createElement('div', { style: { fontWeight: 700, fontSize: 13 } }, sale.receiptNo),
          React.createElement('div', { style: { fontSize: 12, color: 'var(--text3)', fontFamily: 'var(--mono)' } }, fmt.datetime(sale.createdAt))
        ),
        React.createElement('div', { style: { textAlign: 'right' } },
          React.createElement('div', { style: { fontFamily: 'var(--mono)', fontWeight: 700, color: 'var(--accent)' } }, fmt.currency(sale.total, cur)),
          sale.customerName && React.createElement('div', { style: { fontSize: 12, color: 'var(--text3)' } }, sale.customerName)
        )
      ),

      React.createElement('div', { className: 'alert alert-info', style: { marginBottom: 12 } },
        'ℹ İade etmek istediğiniz ürünleri ve miktarları seçin. Seçilen ürünler markete stok olarak geri eklenir.'
      ),

      // Items
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 } },
        sale.items.map(item => {
          const alreadyQty = alreadyReturned[item.productId] || 0;
          const maxReturnable = item.qty - alreadyQty;
          const currentQty = qtys[item.productId] || 0;
          const fullyReturned = maxReturnable === 0;

          return React.createElement('div', {
            key: item.productId,
            style: {
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 12px',
              background: fullyReturned ? 'var(--bg4)' : currentQty > 0 ? 'rgba(59,130,246,0.06)' : 'var(--bg3)',
              border: '1px solid ' + (currentQty > 0 ? 'rgba(59,130,246,0.3)' : 'var(--border)'),
              borderRadius: 8,
              opacity: fullyReturned ? 0.5 : 1,
            }
          },
            React.createElement('div', { style: { flex: 1, minWidth: 0 } },
              React.createElement('div', { style: { fontWeight: 600, fontSize: 13 } }, item.productName),
              React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)', marginTop: 2 } },
                'Satılan: ' + item.qty + ' · Fiyat: ' + fmt.currency(item.price, cur) +
                (alreadyQty > 0 ? ' · Daha önce iade: ' + alreadyQty : '')
              )
            ),
            fullyReturned
              ? React.createElement('span', { className: 'badge badge-gray' }, '✓ İade Edildi')
              : React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 } },
                  React.createElement('button', { className: 'qty-btn', onClick: () => setQty(item.productId, currentQty - 1, maxReturnable) }, '−'),
                  React.createElement('span', { style: { fontFamily: 'var(--mono)', fontWeight: 700, width: 28, textAlign: 'center', fontSize: 14, color: currentQty > 0 ? 'var(--blue)' : 'var(--text3)' } }, currentQty),
                  React.createElement('button', { className: 'qty-btn', onClick: () => setQty(item.productId, currentQty + 1, maxReturnable) }, '+'),
                  React.createElement('span', { style: { fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)' } }, '/ ' + maxReturnable),
                  maxReturnable > 0 && React.createElement('button', {
                    className: 'btn btn-ghost btn-sm', style: { fontSize: 11, padding: '3px 8px' },
                    onClick: () => setQty(item.productId, maxReturnable, maxReturnable)
                  }, 'Tümü')
                )
          );
        })
      ),

      // Summary
      returnItems.length > 0 && React.createElement('div', { style: { background: 'rgba(239,68,68,0.07)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: 8, padding: '12px 14px' } },
        React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
          React.createElement('div', null,

              returnItems.map(i => i.productName + ' x' + i.qty).join(', ')
            )
