          React.createElement('div', { style: { fontFamily: 'var(--sans)', fontWeight: 800, fontSize: 20, color: 'var(--red)' } },
            '−' + fmt.currency(returnTotal, cur)

    React.createElement('div', { className: 'modal-footer' },
      React.createElement('button', { className: 'btn btn-secondary', onClick: onClose }, 'Ləğv et'),
      React.createElement('button', {
        className: 'btn btn-danger',
        disabled: returnItems.length === 0,
        onClick: handleSubmit
      }, '↩️ İadeyi Onayla — ' + fmt.currency(returnTotal, cur))

function SettingsPage() {
  const { settings, saveSettings, addToast, products, sales, categories, customers, users,
          saveProduct, saveCategory, saveUser, saveSettings: saveS, currentUser } = useApp();
  const [form, setForm] = useState({ ...settings });
  const [restoreInfo, setRestoreInfo] = useState(null);
  const [restoreData, setRestoreData] = useState(null);
  const [restoreLoading, setRestoreLoading] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSave = () => {
    saveSettings(form);
    addToast('Parametrlər saxlanıldı.', 'success');
  };

  // ── BACKUP ────────────────────────────────────────
  const handleBackup = () => {
    const now = new Date();
    const backupData = {
      exportedAt: now.toISOString(),
      exportedBy: 'MarketPOS v1.0',
      storeName: settings.storeName || 'MarketPOS',
      date: now.toLocaleDateString('az-AZ'),
      settings,
      products,
      categories,
      sales,
      customers,
      users: users.map(u => ({ ...u, password: '***' })),
    };
    const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'marketpos-yedek-' + now.toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    addToast('Yedek dosyası indirildi: marketpos-yedek-' + now.toISOString().slice(0,10) + '.json', 'success');
  };

  // ── RESTORE: read file ────────────────────────────
  const handleRestoreFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        // Minimal yoxlama: exportedAt VƏ ya products/sales olmalıdır
        const hasProducts = Array.isArray(data.products) || Array.isArray(data.todaySales);
        const hasMarker   = data.exportedAt || data.exportedBy;
        if (!hasMarker && !hasProducts) { addToast('Keçərsiz yedək faylı! (tanınmayan format)', 'error'); return; }
        setRestoreData(data);
        setRestoreInfo({
          exportedAt: data.exportedAt,
          storeName: data.storeName,
          productCount: (data.products || []).length,
          saleCount: (data.sales || data.todaySales || []).length,
          customerCount: (data.customers || []).length,
        });
      } catch { addToast('Fayl oxuna bilmədi. Düzgün JSON yedəyi seçin.', 'error'); }
    };
    reader.readAsText(file, 'utf-8');
    e.target.value = '';
  };

  // ── RESTORE: Mevcut veriyi sil → yeni JSON'u yükle ──
  const handleRestoreApply = async () => {
    if (!restoreData) return;
    const uid = currentUser?.uid;
    if (!uid) { addToast('Sessiya açıq deyil.', 'error'); return; }

    setRestoreLoading(true);
    const d = restoreData;
    const CHUNK = 450;

    // {seconds, nanoseconds} obyektini Firestore Timestamp-ə çevir
    const convertTimestamps = (obj) => {
      if (!obj || typeof obj !== 'object') return obj;
      if (Array.isArray(obj)) return obj.map(convertTimestamps);
      if (obj.seconds != null && obj.nanoseconds != null)
        return firebase.firestore.Timestamp.fromMillis(obj.seconds * 1000 + Math.floor(obj.nanoseconds / 1e6));
      const result = {};
      for (const key of Object.keys(obj)) result[key] = convertTimestamps(obj[key]);
      return result;
    };

    // Koleksiyondaki tüm belgeleri tek tek sil (parallel), sonra bekle
    const deleteCollection = async (col) => {
      const snap = await fbDB.collection(col).where('ownerId', '==', uid).get();
      if (snap.empty) return;
      await Promise.all(snap.docs.map(doc => doc.ref.delete()));
    };

    // Diziyi CHUNK'lara bölerek batch ile yükle
    const uploadChunked = async (col, items) => {
      for (let i = 0; i < items.length; i += CHUNK) {
        const b = fbDB.batch();
        items.slice(i, i + CHUNK).forEach(item => {
          const { id, ...rawData } = item;
          // ownerId → cari istifadəçi, Timestamp-ları çevir
          const data = convertTimestamps({ ...rawData, ownerId: uid });
          const ref = id ? fbDB.collection(col).doc(id) : fbDB.collection(col).doc();
          b.set(ref, data);
        });
        await b.commit();
      }
    };

    try {
      // 1. Önce TAMAMEN SİL
      addToast('Mövcud məlumatlar silinir…', 'info');
      await deleteCollection('products');
      await deleteCollection('sales');
      await deleteCollection('returns');

      // 2. Sonra YENİ VERİYİ YÜKLE
      addToast('Yeni məlumatlar yüklənir…', 'info');
      await uploadChunked('products', d.products || []);
      await uploadChunked('sales',    d.sales || d.todaySales || []);
      await uploadChunked('returns',  d.returns  || []);

      // 3. Store ayarları
      if (d.settings) {
        await fbDB.collection('stores').doc(uid).set(
          { settings: d.settings, ownerName: d.settings.storeName || '' },
          { merge: true }
        );
      }

      // 4. Kategoriler & müşteriler → localStorage
      if (d.categories) localStorage.setItem('pos_categories', JSON.stringify(d.categories));
      if (d.customers)  localStorage.setItem('pos_customers',  JSON.stringify(d.customers));

      addToast('Məlumatlar uğurla yeniləndi!', 'success');
      setRestoreData(null);
      setRestoreInfo(null);
      setTimeout(() => window.location.reload(), 1500);
    } catch (err) {
      console.error('[Restore]', err);
      addToast('Yükləmə xətası: ' + err.message, 'error');
    } finally {
      setRestoreLoading(false);
    }
  };

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('div', null,
        React.createElement('h1', { className: 'page-title' }, '⚙️ Parametrlər'),
        React.createElement('p', { className: 'page-subtitle' }, 'Mağaza ve sistem ayarları')
      ),
      React.createElement('button', { className: 'btn btn-primary', onClick: handleSave }, '💾 Kaydet')
    ),
    React.createElement('div', { className: 'page-body' },
      React.createElement('div', { style: { maxWidth: 600 } },
        React.createElement('div', { className: 'card', style: { marginBottom: 16 } },
          React.createElement('div', { className: 'card-header' }, React.createElement('span', { className: 'card-title' }, '🏪 Mağaza Bilgileri')),
          React.createElement('div', { className: 'form-group' }, React.createElement('label', { className: 'form-label' }, 'Mağaza adı'), React.createElement('input', { className: 'form-control', value: form.storeName || '', onChange: e => set('storeName', e.target.value), placeholder: 'Mağaza adı' })),
          React.createElement('div', { className: 'form-group' }, React.createElement('label', { className: 'form-label' }, 'Ünvan'), React.createElement('input', { className: 'form-control', value: form.address || '', onChange: e => set('address', e.target.value), placeholder: 'Nizami küçəsi 12, Bakı' })),
          React.createElement('div', { className: 'form-grid-2' },
            React.createElement('div', { className: 'form-group' }, React.createElement('label', { className: 'form-label' }, 'Telefon'), React.createElement('input', { className: 'form-control', value: form.phone || '', onChange: e => set('phone', e.target.value), placeholder: '070 000 00 00' })),
            React.createElement('div', { className: 'form-group' }, React.createElement('label', { className: 'form-label' }, 'E-posta'), React.createElement('input', { className: 'form-control', value: form.email || '', onChange: e => set('email', e.target.value), placeholder: 'magaza@email.com' }))
          )
        ),

function EndOfDayModal({ onClose }) {
  const { sales, products, settings, users, categories, customers, returns, addToast } = useApp();
  const cur = settings.currency || '₼';
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);

  // Today's sales
  const todaySales = sales.filter(s => toDate(s.createdAt) >= today);
  const todayReturns = (returns || []).filter(r => toDate(r.createdAt) >= today);
  const totalReturnAmount = todayReturns.reduce((a, r) => a + (r.total || 0), 0);
  const totalRevenue = todaySales.reduce((a, s) => a + s.total, 0) - totalReturnAmount;  // Net Dövriyyə
  const grossRevenue = todaySales.reduce((a, s) => a + s.total, 0);
  const avgSale = todaySales.length > 0 ? grossRevenue / todaySales.length : 0;
  const totalItems = todaySales.reduce((a, s) => a + s.items.reduce((b, i) => b + i.qty, 0), 0);

  // Helpers for cost lookup
  const itemCost = (item) => { const p = products.find(x => x.id === item.productId); return (p ? p.purchasePrice || 0 : 0) * item.qty; };

  // Gross cost of all today's sold items
  const totalCostGross = todaySales.reduce((a, s) => a + s.items.reduce((b, i) => b + itemCost(i), 0), 0);
  // Cost of returned items (restored to inventory)
  const returnCost = todayReturns.reduce((a, r) => a + (r.items || []).reduce((b, i) => b + itemCost(i), 0), 0);
  const totalCost = totalCostGross - returnCost;
  const totalProfit = totalRevenue - totalCost;
  const profitMargin = totalRevenue > 0 ? (totalProfit / totalRevenue * 100) : 0;

  // Retail vs Wholesale — NET (returns by saleType subtracted for consistency)
  const retailSales = todaySales.filter(s => s.type === 'retail');
  const wholeSales  = todaySales.filter(s => s.type === 'wholesale');
  const retailReturns = todayReturns.filter(r => r.saleType === 'retail');
  const wholeReturns  = todayReturns.filter(r => r.saleType === 'wholesale');
  const retailRevenue = retailSales.reduce((a, s) => a + s.total, 0) - retailReturns.reduce((a, r) => a + (r.total || 0), 0);
  const wholeRevenue  = wholeSales.reduce((a, s)  => a + s.total, 0) - wholeReturns.reduce((a, r)  => a + (r.total || 0), 0);
  const retailCostGross = retailSales.reduce((a, s) => a + s.items.reduce((b, i) => b + itemCost(i), 0), 0);
  const wholeCostGross  = wholeSales.reduce((a, s)  => a + s.items.reduce((b, i) => b + itemCost(i), 0), 0);
  const retailReturnCost = retailReturns.reduce((a, r) => a + (r.items || []).reduce((b, i) => b + itemCost(i), 0), 0);
  const wholeReturnCost  = wholeReturns.reduce((a, r)  => a + (r.items || []).reduce((b, i) => b + itemCost(i), 0), 0);
  const retailCost = retailCostGross - retailReturnCost;
  const wholeCost  = wholeCostGross  - wholeReturnCost;

  // Top products today
  const prodMap = {};
  todaySales.forEach(s => s.items.forEach(i => {
    if (!prodMap[i.productId]) prodMap[i.productId] = { name: i.productName, qty: 0, revenue: 0 };
    prodMap[i.productId].qty += i.qty;
    prodMap[i.productId].revenue += i.lineTotal;
  }));
  const topProducts = Object.values(prodMap).sort((a, b) => b.revenue - a.revenue).slice(0, 5);

  // Cashier breakdown
  const cashierMap = {};
  todaySales.forEach(s => {
    if (!cashierMap[s.cashierName]) cashierMap[s.cashierName] = { count: 0, revenue: 0 };
    cashierMap[s.cashierName].count++;
    cashierMap[s.cashierName].revenue += s.total;
  });

  // Format currency helper
  const fc = (n) => cur + n.toLocaleString('az-AZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  // JSON Backup
  const handleBackup = () => {
    const backupData = {
      exportedAt: new Date().toISOString(),
      exportedBy: 'MarketPOS v1.0',

      summary: {
        totalRevenue,
        totalCost,

        profitMarginPercent: +profitMargin.toFixed(2),

              React.createElement('div', { className: 'eod-stat-box' },
                React.createElement('div', { className: 'eod-stat-box-val', style: { color: 'var(--red)', fontSize: 16 } }, fc(totalCost)),
                React.createElement('div', { className: 'eod-stat-box-label' }, 'Alış Maliyeti')
              ),
              React.createElement('div', { className: 'eod-stat-box', style: { background: totalProfit >= 0 ? 'rgba(34,197,94,0.07)' : 'rgba(239,68,68,0.07)', border: '1px solid ' + (totalProfit >= 0 ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)') } },
                React.createElement('div', { className: 'eod-stat-box-val', style: { color: totalProfit >= 0 ? 'var(--green)' : 'var(--red)', fontSize: 16 } }, fc(totalProfit)),
                React.createElement('div', { className: 'eod-stat-box-label' }, 'Net Kazanç')
              )
            ),

            // İşlem istatistikleri
            React.createElement('div', { className: 'eod-section-title' }, 'İşlem Özeti'),
            React.createElement('div', { className: 'eod-stats-row' },
              React.createElement('div', { className: 'eod-stat-box' },
                React.createElement('div', { className: 'eod-stat-box-val', style: { color: 'var(--accent)' } }, todaySales.length),
                React.createElement('div', { className: 'eod-stat-box-label' }, 'İşlem')
              ),
              React.createElement('div', { className: 'eod-stat-box' },
                React.createElement('div', { className: 'eod-stat-box-val', style: { color: 'var(--blue)' } }, totalItems),
                React.createElement('div', { className: 'eod-stat-box-label' }, 'Ürün Satıldı')
              ),
              React.createElement('div', { className: 'eod-stat-box' },
                React.createElement('div', { className: 'eod-stat-box-val', style: { color: 'var(--purple)', fontSize: 15 } }, fc(avgSale)),
                React.createElement('div', { className: 'eod-stat-box-label' }, 'Ort. Sepet')
              )
            ),

            // Perakende / Toptan — şimdi ciro + kazanç ayrı
            React.createElement('div', { className: 'eod-section-title' }, 'Satış Türü Dağılımı'),
            React.createElement('div', { className: 'eod-breakdown' },
              React.createElement('div', { className: 'eod-breakdown-box' },
                React.createElement('div', { className: 'eod-breakdown-type' }, '🏷 Perakende'),
                React.createElement('div', { className: 'eod-breakdown-val', style: { color: 'var(--accent)' } }, fc(retailRevenue)),
                React.createElement('div', { className: 'eod-breakdown-sub' }, retailSales.length + ' əməliyyat'),
                React.createElement('div', { style: { marginTop: 6, fontSize: 12, color: 'var(--green)', fontFamily: 'var(--mono)', fontWeight: 700 } }, 'Kazanç: ' + fc(retailRevenue - retailCost))
              ),
              React.createElement('div', { className: 'eod-breakdown-box' },
                React.createElement('div', { className: 'eod-breakdown-type' }, '📦 Toptan'),
                React.createElement('div', { className: 'eod-breakdown-val', style: { color: 'var(--blue)' } }, fc(wholeRevenue)),
                React.createElement('div', { className: 'eod-breakdown-sub' }, wholeSales.length + ' əməliyyat'),
                React.createElement('div', { style: { marginTop: 6, fontSize: 12, color: 'var(--green)', fontFamily: 'var(--mono)', fontWeight: 700 } }, 'Kazanç: ' + fc(wholeRevenue - wholeCost))
              )
            ),

            // Top products
            topProducts.length > 0 && React.createElement('div', null,
              React.createElement('div', { className: 'eod-section-title' }, 'Bugünün En Çok Satanları'),
              React.createElement('div', { className: 'eod-top-list' },
                topProducts.map((p, i) =>
                  React.createElement('div', { key: i, className: 'eod-top-item' },
                    React.createElement('span', { className: 'eod-top-rank' }, '#' + (i+1)),
                    React.createElement('span', { className: 'eod-top-name' }, p.name),
                    React.createElement('span', { className: 'eod-top-qty' }, p.qty + ' ədəd'),
                    React.createElement('span', { className: 'eod-top-rev' }, fc(p.revenue))
                  )
                )
              )
            ),

            // Cashier breakdown
            Object.keys(cashierMap).length > 0 && React.createElement('div', null,
              React.createElement('div', { className: 'eod-section-title' }, 'Kasiyer Performansı'),
              Object.entries(cashierMap).map(([name, data]) =>
                React.createElement('div', { key: name, className: 'eod-cashier-row' },
                  React.createElement('div', null,
                    React.createElement('div', { style: { fontWeight: 600, fontSize: 13 } }, name),
                    React.createElement('div', { style: { fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)' } }, data.count + ' əməliyyat')
                  ),
                  React.createElement('div', { style: { fontFamily: 'var(--mono)', fontWeight: 700, color: 'var(--accent)' } }, fc(data.revenue))
                )
              )
            ),

            todaySales.length === 0 && React.createElement('div', { className: 'alert alert-info', style: { marginTop: 12 } }, 'ℹ Bugün henüz satış yapılmadı.'),

            // Backup note
            React.createElement('div', { className: 'eod-backup-note' }, '💾 Yedek dosyası tüm verilerinizi (ürünler, satışlar, ayarlar) JSON formatında kaydeder.')
          )
        )
      ),
      React.createElement('div', { className: 'modal-footer', style: { gap: 8 } },
        React.createElement('button', { className: 'btn btn-secondary', onClick: onClose }, 'Bağla'),
        React.createElement('button', { className: 'btn btn-secondary', onClick: handlePrint }, '🖨️ Yazdır'),
React.createElement('button', { className: 'btn btn-primary', onClick: handleBackup, style: { background: 'var(--green)', color: '#000' } }, '💾 JSON Yedek İndir')
      )
    )
  );
}

// ============================================================
// APP SHELL
// ============================================================
function AppShell() {
  const { currentUser, sales, returns, settings, authReady } = useApp();

  if (!authReady) return React.createElement('div', {
    style: { display: 'flex', alignItems: 'center', justifyContent: 'center',
             height: '100vh', background: 'var(--bg)', color: 'var(--accent)',
             fontFamily: 'var(--mono)', fontSize: 14, letterSpacing: '0.05em' }
  }, '⬡  MarketPOS yükleniyor...');
  const [page, setPage] = useState('dashboard');
  const [showEOD, setShowEOD] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const isAdmin = currentUser?.role === 'admin';
  const cur = settings?.currency || '₼';

  // Close sidebar on page change
  const navigate = (p) => { setPage(p); setSidebarOpen(false); };

  useEffect(() => {
    if (!isAdmin && !['pos','sales'].includes(page)) setPage('pos');
  }, [isAdmin]);

  // Today's stats for topbar
  const today = new Date(); today.setHours(0,0,0,0);
  const todaySales = sales.filter(s => toDate(s.createdAt) >= today);
  const todayReturns = (returns || []).filter(r => toDate(r.createdAt) >= today);
  const todayRev = todaySales.reduce((a, s) => a + s.total, 0) - todayReturns.reduce((a, r) => a + (r.total || 0), 0);

  if (!currentUser) return React.createElement(LoginPage);

  const pages = {
    dashboard: isAdmin ? React.createElement(Dashboard, { setPage: navigate }) : React.createElement(POSPage),
    pos: React.createElement(POSPage),
    sales: React.createElement(SalesPage),
    products: isAdmin ? React.createElement(ProductsPage) : React.createElement(POSPage),
    inventory: isAdmin ? React.createElement(InventoryPage) : React.createElement(POSPage),
    warehouse: isAdmin ? React.createElement(WarehousePage) : React.createElement(POSPage),
    transfer: React.createElement(TransferPage),
    returns: isAdmin ? React.createElement(ReturnsPage) : React.createElement(POSPage),
    categories: isAdmin ? React.createElement(CategoriesPage) : React.createElement(POSPage),
    reports: isAdmin ? React.createElement(ReportsPage) : React.createElement(POSPage),
    users: isAdmin ? React.createElement(UsersPage) : React.createElement(POSPage),
    settings: isAdmin ? React.createElement(SettingsPage) : React.createElement(POSPage),
  };

  return React.createElement('div', { className: 'app-shell' },

    // ── Topbar (tablet/mobile only) ──────────────────────────
    React.createElement('div', { className: 'topbar' },
      React.createElement('div', { className: 'topbar-hamburger', onClick: () => setSidebarOpen(o => !o) }, sidebarOpen ? '✕' : '☰'),
      React.createElement('div', { className: 'topbar-logo' }, settings?.storeName || 'MarketPOS'),
      React.createElement('div', { className: 'topbar-daily' },
        React.createElement('div', { className: 'topbar-daily-rev' }, cur + todayRev.toLocaleString('az-AZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 })),
        React.createElement('div', { className: 'topbar-daily-cnt' }, todaySales.length + ' əməliyyat bu gün')
      ),
      React.createElement('button', { className: 'topbar-eod', onClick: () => setShowEOD(true), title: 'Günü Bitir' }, '🌙')
    ),

    // ── Sidebar overlay ──────────────────────────────────────
    React.createElement('div', { className: `sidebar-overlay${sidebarOpen ? ' show' : ''}`, onClick: () => setSidebarOpen(false) }),

    React.createElement(Sidebar, { activePage: page, setPage: navigate, setShowEOD, sidebarOpen }),
    React.createElement('div', { className: 'main-content' },
      pages[page] || pages.dashboard
    ),
    React.createElement(ToastContainer),
    showEOD && React.createElement(EndOfDayModal, { onClose: () => setShowEOD(false) })
  );
}

// ============================================================
// ROOT
// ============================================================
function App() {
  return React.createElement(AppProvider, null,
    React.createElement(AppShell)
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>

      .then(function(reg) { console.log('MarketPOS SW kayıtlı:', reg.scope); })
      .catch(function(err) { console.log('SW kayıt hatası:', err); });
